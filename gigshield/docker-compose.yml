version: "3.9"

services:

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  api:
    build: ./backend
    container_name: gigshield_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://gigshield:gigshield@db:5432/gigshield_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OWM_API_KEY=${OWM_API_KEY}
      - WAQI_API_KEY=${WAQI_API_KEY}
      - RAZORPAY_KEY=${RAZORPAY_KEY}
      - RAZORPAY_SECRET=${RAZORPAY_SECRET}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # Celery Worker (Trigger Engine)
  # ─────────────────────────────────────────────
  worker:
    build: ./backend
    container_name: gigshield_worker
    environment:
      - DATABASE_URL=postgresql://gigshield:gigshield@db:5432/gigshield_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.triggers.trigger_manager worker --loglevel=info

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4   # PostgreSQL + PostGIS
    container_name: gigshield_db
    environment:
      POSTGRES_DB: gigshield_db
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gigshield_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
